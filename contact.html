<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <style>
    @font-face {
      font-family: 'Urbanist';
      src: url('assets/assets/fonts/urbanist/Urbanist-Regular.ttf') format('truetype'); /* Adjust the path as per your file structure */
      font-weight: normal;
      font-style: normal;
    }

    body {
      font-family: 'Urbanist', 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #e9ecef;
    }
    .contact-form {
      font-family: 'Urbanist', 'Helvetica Neue', Arial, sans-serif; /* Apply Urbanist font to the form specifically */
      background: #fff;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .contact-form img {
      max-width: 150px;
      margin-bottom: 20px;
    }
    .contact-form h2 {
      margin-bottom: 20px;
      font-size: 24px;
      color: #333;
    }
    .contact-form input, .contact-form textarea {
      width: 100%;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
      transition: border-color 0.3s ease;
    }
    .contact-form input:focus, .contact-form textarea:focus {
      border-color: #007BFF;
      outline: none;
    }
    .contact-form button {
      background-color: #007BFF;
      color: white;
      padding: 15px 20px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .contact-form button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="contact-form">
    <img src="your-logo-url.png" alt="Your Logo">
    <h2>Contact Us</h2>
    <form action="https://formspree.io/f/xrgnnvkp" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
      <button type="submit" name="send">Send Message</button>
    </form>
  </div>
</body>
</html>
